services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "127.0.0.1:${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../backend/sql/mysql-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - data

  neo4j:
    image: neo4j:5
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
    ports:
      - "127.0.0.1:${NEO4J_HTTP_HOST_PORT:-7474}:7474"
      - "127.0.0.1:${NEO4J_BOLT_HOST_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - data

  influxdb:
    image: influxdb:2.7
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USER}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_ADMIN_TOKEN}
    ports:
      - "127.0.0.1:${INFLUXDB_HOST_PORT:-8086}:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - data

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MQTT_HOST_PORT:-28884}:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - data

  gateway:
    build:
      context: ../backend
      dockerfile: gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GATEWAY_HOST_PORT:-8080}:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      GATEWAY_CORS_ORIGINS: ${GATEWAY_CORS_ORIGINS}
      API_SERVICE_URI: ${API_SERVICE_URI}
      ALGORITHM_SERVICE_URI: ${ALGORITHM_SERVICE_URI}
    depends_on:
      api-service:
        condition: service_started
    networks:
      - frontend
      - backend

  api-service:
    build:
      context: ../backend
      dockerfile: api-service/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${API_SERVICE_HOST_PORT:-8081}:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_USERNAME: neo4j
      SPRING_NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_ADMIN_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      JWT_SECRET: ${JWT_SECRET}
      ALGORITHM_ENGINE_URL: ${ALGORITHM_ENGINE_URL}
      ALGORITHM_ENGINE_API_KEY: ${ALGORITHM_ENGINE_API_KEY}
      AUTH_DEMO_ENABLED: ${AUTH_DEMO_ENABLED}
      AUTH_DEMO_USERNAME: ${AUTH_DEMO_USERNAME}
      AUTH_DEMO_PASSWORD: ${AUTH_DEMO_PASSWORD}
      WEBSOCKET_ALLOWED_ORIGINS: ${GATEWAY_CORS_ORIGINS}
      DEMO_DATA_ENABLED: ${DEMO_DATA_ENABLED}
    depends_on:
      mysql:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - backend
      - data

  algorithm:
    build:
      context: ../algorithm
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${ALGORITHM_HOST_PORT:-8000}:8000"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    environment:
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_ADMIN_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      ALGO_CORS_ORIGINS: ${ALGO_CORS_ORIGINS}
      ALGO_INTERNAL_API_KEY: ${ALGO_INTERNAL_API_KEY}
    depends_on:
      influxdb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - backend
      - data

  web:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_HOST_PORT:-80}:80"
    depends_on:
      gateway:
        condition: service_started
    networks:
      - frontend
      - backend

  mqtt-bridge:
    build:
      context: ../algorithm
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python bridge/mqtt_kafka_bridge.py
    environment:
      PYTHONPATH: /app
      KAFKA_BOOTSTRAP: kafka:9092
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX}
    depends_on:
      mosquitto:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - backend
      - data

volumes:
  mysql_data:
  neo4j_data:
  influxdb_data:
  redis_data:

networks:
  frontend:
  backend:
  data:
