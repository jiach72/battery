name: Deploy Demo

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'algorithm/**'
      - 'backend/**'
      - 'deploy/**'
      - 'docker/**'
      - 'frontend/**'
      - '.github/workflows/deploy-demo.yml'

concurrency:
  group: battery-demo-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: /opt/battery-demo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH known_hosts
        run: |
          install -d -m 700 ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Prepare remote directories
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "sudo mkdir -p '${DEPLOY_PATH}/repo' && sudo chown -R '${DEPLOY_USER}:${DEPLOY_USER}' '${DEPLOY_PATH}'"

      - name: Sync source tree
        run: |
          rsync -az --delete \
            --exclude '.git/' \
            --exclude 'frontend/node_modules/' \
            --exclude 'frontend/dist/' \
            --exclude 'backend/**/target/' \
            --exclude 'algorithm/__pycache__/' \
            --exclude 'algorithm/.pytest_cache/' \
            --exclude '.tmp-*' \
            --exclude 'output/' \
            --exclude 'scratch/' \
            --exclude 'tmp/' \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/repo/"

      - name: Deploy on server
        shell: bash
        run: |
          set -eo pipefail
          mkdir -p .logs
          {
            ssh -o ConnectTimeout=20 -o ServerAliveInterval=30 -o ServerAliveCountMax=2 "${DEPLOY_USER}@${DEPLOY_HOST}" "bash -se" <<EOF
          set -euxo pipefail
          cd '${DEPLOY_PATH}/repo'
          REPO_DIR='${DEPLOY_PATH}/repo' DEPLOY_DIR='${DEPLOY_PATH}' bash -x deploy/demo-deploy.sh
          EOF
          } 2>&1 | tee .logs/deploy-server.log

      - name: Collect remote diagnostics
        if: always()
        shell: bash
        run: |
          set -eo pipefail
          mkdir -p .logs
          {
            ssh -o ConnectTimeout=20 -o ServerAliveInterval=30 -o ServerAliveCountMax=2 "${DEPLOY_USER}@${DEPLOY_HOST}" "bash -se" <<EOF
          set -euxo pipefail
          echo "== pwd =="
          pwd
          echo "== deploy dir =="
          ls -la '${DEPLOY_PATH}' || true
          echo "== repo dir =="
          ls -la '${DEPLOY_PATH}/repo' || true
          echo "== docker ps =="
          docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' || true
          echo "== listening ports =="
          ss -ltnp | grep -E ':(80|443|3010|8080|8081|8000)\\b' || true
          echo "== nginx summary =="
          sudo nginx -T 2>/dev/null | grep -nE 'battery\\.scdc\\.cloud|scdc\\.cloud|server_name|listen 80|listen 443' || true
          echo "== local checks =="
          curl -k -I --max-time 5 -H 'Host: battery.scdc.cloud' https://127.0.0.1 || true
          curl -I --max-time 5 http://127.0.0.1:3010 || true
          EOF
          } 2>&1 | tee .logs/remote-diagnostics.log

      - name: Upload deploy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-server-log
          path: .logs/deploy-server.log
          if-no-files-found: ignore

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-remote-diagnostics
          path: .logs/remote-diagnostics.log
          if-no-files-found: ignore
